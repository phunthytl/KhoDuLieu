<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Pivot Analyzer - Premium OLAP</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); position: relative; }
        .filter-chip { display: inline-flex; align-items: center; background: #e2e8f0; color: #475569; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; margin: 2px; border: 1px solid #cbd5e1; }
        .filter-chip i { margin-left: 6px; cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .filter-chip i:hover { color: #ef4444; }
        .loader { width: 48px; height: 48px; border: 5px solid #e2e8f0; border-bottom-color: #0369a1; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header & Config -->
        <div class="glass-card p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"><i class="fas fa-arrows-alt-h mr-1"></i> Xem theo (Trục X)</label>
                    <select id="sel-x" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm outline-none" onchange="pivotState.xAxis=this.value; pivotState.levels[this.value]=0; runPivot();">
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"><i class="fas fa-layer-group mr-1"></i> Phân lớp (Nhóm Legend)</label>
                    <select id="sel-legend" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm outline-none" onchange="pivotState.legend=this.value==='none'?null:this.value; runPivot();">
                        <option value="none">-- Không phân lớp --</option>
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"><i class="fas fa-filter mr-1"></i> Lớp 3 (Trục Z / Filter)</label>
                    <select id="sel-z" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm outline-none" onchange="pivotState.zAxis=this.value==='none'?null:this.value; runPivot();">
                        <option value="none">-- Không sử dụng --</option>
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"><i class="fas fa-calculator mr-1"></i> Đo Lường (Measure)</label>
                    <select id="sel-measure" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm outline-none" onchange="pivotState.measure=this.value; runPivot();">
                        <option value="tongtien">Tổng Tiền Doanh Thu (VND)</option>
                        <option value="soluong">Tổng Số Lượng Bán (Cái)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Dashboard Body -->
        <div class="grid grid-cols-1 gap-6">
            <div class="glass-card p-6 min-h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800" id="chart-title">Phân tích dữ liệu</h2>
                    <div id="active-slices" class="flex flex-wrap gap-1"></div>
                </div>
                <div id="chart-loader" class="hidden absolute inset-0 bg-white/50 z-20 flex items-center justify-center rounded-2xl">
                    <span class="loader"></span>
                </div>
                <div id="main-chart" class="w-full h-[450px]"></div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider">Bảng dữ liệu</h3>
                    <button onclick="resetAllSlices()" class="text-blue-600 text-xs font-bold hover:underline">Reset tất cả bộ lọc</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-100 border-b border-slate-200">
                            <tr>
                                <th id="th-x" class="px-6 py-3 font-semibold text-slate-600">TRỤC X</th>
                                <th id="th-y" class="px-6 py-3 font-semibold text-slate-600">LEGEND</th>
                                <th id="th-z" class="px-6 py-3 font-semibold text-slate-600">Z-AXIS</th>
                                <th class="px-6 py-3 font-semibold text-slate-600 text-right">GIÁ TRỊ</th>
                            </tr>
                        </thead>
                        <tbody id="dt-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DIM_NAMES = { thoigian: 'Thời Gian', vpdd: 'Vùng Miền', khachhang: 'Khách Hàng', mathang: 'Mặt Hàng' };
        
        let pivotState = {
            xAxis: 'thoigian',
            legend: null,
            zAxis: null,
            measure: 'tongtien',
            levels: { thoigian: 0, vpdd: 0, khachhang: 0, mathang: 0 },
            filters: { thoigian: {}, vpdd: {}, khachhang: {}, mathang: {} }
        };

        async function runPivot() {
            const xAxis = pivotState.xAxis || 'thoigian';
            document.getElementById('chart-title').innerText = `Phân tích ${DIM_NAMES[xAxis]}` + (pivotState.legend ? ` chia theo ${DIM_NAMES[pivotState.legend]}` : '');
            renderActiveSlices();

            const payload = {
                xAxis: xAxis,
                xLevelIdx: pivotState.levels[xAxis] || 0,
                legend: pivotState.legend,
                legendLevelIdx: pivotState.legend ? (pivotState.levels[pivotState.legend] || 0) : 0,
                zAxis: pivotState.zAxis,
                zLevelIdx: pivotState.zAxis ? (pivotState.levels[pivotState.zAxis] || 0) : 0,
                measure: pivotState.measure,
                filters: pivotState.filters
            };

            const loader = document.getElementById('chart-loader');
            loader.classList.remove('hidden');

            try {
                const res = await fetch('/api/pivot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.error);

                console.log("---- TRUE OLAP MDX ----\n", json.mdx);
                
                const data = json.data || { x_labels: [], series: [] };
                drawChart(data);
                fillTable(data);
            } catch (e) {
                console.error(e);
                alert("OLAP Error: " + e.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function drawChart(data) {
            const chartDiv = document.getElementById('main-chart');
            if (!data || !data.series || data.series.length === 0) {
                chartDiv.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400 font-medium">Không có dữ liệu cho bộ lọc này.</div>';
                return;
            }

            try {
                const traces = data.series.map(s => ({
                    x: data.x_labels || [],
                    y: s.data || [],
                    name: s.name || 'Tổng',
                    type: 'bar',
                    marker: { borderRadius: 8 },
                    hovertemplate: `<b>%{x}</b><br>${s.name}: %{y:,.0f}<extra></extra>`
                }));

                const layout = {
                    barmode: pivotState.xAxis === 'thoigian' ? 'stack' : 'group',
                    xaxis: { 
                        type: 'category', 
                        categoryorder: 'array', 
                        categoryarray: data.x_labels || [], 
                        tickangle: -45, 
                        tickfont: { size: 11, family: 'Inter' } 
                    },
                    yaxis: { gridcolor: '#f1f5f9', tickfont: { family: 'Inter' } },
                    margin: { l: 60, r: 20, t: 30, b: 80 },
                    hovermode: 'closest',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    legend: { orientation: 'h', y: -0.25, font: { family: 'Inter', size: 11 } }
                };

                Plotly.newPlot(chartDiv, traces, layout, { responsive: true, displayModeBar: false });
                
                chartDiv.on('plotly_click', d => {
                    if (d.points && d.points[0]) drillDown(d.points[0].x);
                });
            } catch (err) {
                console.error("Plotly Error:", err);
                chartDiv.innerHTML = '<div class="flex items-center justify-center h-full text-red-400">Lỗi hiển thị biểu đồ.</div>';
            }
        }

        function fillTable(data) {
            const body = document.getElementById('dt-body');
            const xAxis = pivotState.xAxis || 'thoigian';
            
            document.getElementById('th-x').textContent = (DIM_NAMES[xAxis] || 'TRỤC X').toUpperCase();
            document.getElementById('th-y').textContent = pivotState.legend ? (DIM_NAMES[pivotState.legend] || 'LEGEND').toUpperCase() : '-';
            document.getElementById('th-z').textContent = pivotState.zAxis ? (DIM_NAMES[pivotState.zAxis] || 'Z-AXIS').toUpperCase() : '-';

            let tableHTML = '';
            if (data && data.x_labels && data.series) {
                data.x_labels.forEach((xVal, xIdx) => {
                    if (!data.series) return;
                    data.series.forEach(s => {
                        const val = (s.data && s.data[xIdx]) ? s.data[xIdx] : 0;
                        if (val === 0) return;
                        
                        tableHTML += `
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-3 font-semibold text-slate-700">${xVal}</td>
                                <td class="px-6 py-3 text-slate-500">${s.leg_val || '-'}</td>
                                <td class="px-6 py-3 text-slate-500">${s.z_val || '-'}</td>
                                <td class="px-6 py-3 text-right font-bold text-blue-600">${new Intl.NumberFormat().format(val)}</td>
                            </tr>`;
                    });
                });
            }
            body.innerHTML = tableHTML || '<tr><td colspan="4" class="p-10 text-center text-slate-400">Không có dữ liệu.</td></tr>';
        }

        function drillDown(value) {
            const dimension = pivotState.xAxis;
            const currentLevel = pivotState.levels[dimension] || 0;
            const lvls = { 
                thoigian: ['Nam', 'Quy', 'Thang'], 
                vpdd: ['Bang', 'TenThanhPho'], 
                khachhang: ['LoaiKhachHang', 'TenKhachHang'], 
                mathang: ['MoTa', 'KichCo'] 
            };
            
            if (dimension && lvls[dimension] && currentLevel < lvls[dimension].length - 1) {
                // SỬA LỖI: Nếu value là chuỗi phân cấp (vd: 2022 - Quy 1), chỉ lấy phần cuối (Quy 1)
                let actualVal = String(value);
                if (actualVal.includes(" - ")) {
                    const parts = actualVal.split(" - ");
                    actualVal = parts[parts.length - 1];
                }

                let filterValue = actualVal;
                if (dimension === 'thoigian') {
                    filterValue = actualVal.replace(/Quý |Quy |Tháng |Thang |Năm |Nam /g, '');
                }
                
                const lvlName = lvls[dimension][currentLevel];
                if (!pivotState.filters[dimension]) pivotState.filters[dimension] = {};
                pivotState.filters[dimension][lvlName] = filterValue;
                pivotState.levels[dimension]++;
                runPivot();
            }
        }

        function removeSlice(dim, lvlStr) {
            const lvls = { 
                thoigian: ['Nam', 'Quy', 'Thang'], 
                vpdd: ['Bang', 'TenThanhPho'], 
                khachhang: ['LoaiKhachHang', 'TenKhachHang'], 
                mathang: ['MoTa', 'KichCo'] 
            };
            if (!lvls[dim]) return;
            
            const idx = lvls[dim].indexOf(lvlStr);
            if (idx === -1) return;

            delete pivotState.filters[dim][lvlStr];
            pivotState.levels[dim] = idx;
            for (let i = idx + 1; i < lvls[dim].length; i++) {
                delete pivotState.filters[dim][lvls[dim][i]];
            }
            runPivot();
        }

        function resetAllSlices() {
            Object.keys(pivotState.levels).forEach(k => { 
                pivotState.levels[k] = 0; 
                pivotState.filters[k] = {}; 
            });
            runPivot();
        }

        function renderActiveSlices() {
            const container = document.getElementById('active-slices');
            container.innerHTML = '';
            let has = false;
            for (const d in pivotState.filters) {
                for (const l in pivotState.filters[d]) {
                    const v = pivotState.filters[d][l];
                    if (v) {
                        has = true;
                        container.innerHTML += `<span class="filter-chip">${DIM_NAMES[d]}: <b>${v}</b><i class="fas fa-times-circle" onclick="removeSlice('${d}', '${l}')"></i></span>`;
                    }
                }
            }
            if (!has) container.innerHTML = '<span class="text-xs text-slate-400 italic">Chưa áp dụng bộ lọc</span>';
        }

        document.addEventListener('DOMContentLoaded', runPivot);
    </script>
</body>
</html>
