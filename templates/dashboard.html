<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Pivot Analyzer - Professional OLAP</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link tới CSS thuần -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <!-- Header Bar -->
        <header class="header-bar">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-chart-line"></i></div>
                <div class="brand-title">
                    <h1>Phân tích Doanh Thu Bán Hàng</h1>
                </div>
            </div>
            <div class="kpi-container">
                <div class="kpi-card">
                    <p class="kpi-label">Tổng Doanh Thu</p>
                    <h2 id="kpi-revenue" class="kpi-value">0 VNĐ</h2>
                </div>
                <div class="kpi-card success">
                    <p class="kpi-label">Tổng Sản Lượng</p>
                    <h2 id="kpi-quantity" class="kpi-value">0 Cái</h2>
                </div>
            </div>
        </header>

        <!-- Filters Config -->
        <section class="card">
            <div class="filter-grid">
                <div class="filter-group">
                    <label><i class="fas fa-arrows-alt-h"></i> Trục X</label>
                    <select id="sel-x" onchange="pivotState.xAxis=this.value; runPivot();">
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-layer-group"></i> Phân loại (Legend)</label>
                    <select id="sel-legend" onchange="pivotState.legend=this.value==='none'?null:this.value; runPivot();">
                        <option value="none">-- Không phân lớp --</option>
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-cubes"></i> Trục Z (Sâu)</label>
                    <select id="sel-z" onchange="pivotState.zAxis=this.value==='none'?null:this.value; runPivot();">
                        <option value="none">-- Không sử dụng --</option>
                        <option value="thoigian">Thời Gian</option>
                        <option value="vpdd">Vùng Miền</option>
                        <option value="khachhang">Khách Hàng</option>
                        <option value="mathang">Mặt Hàng</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-balance-scale"></i> Độ đo (Measure)</label>
                    <select id="sel-measure" onchange="pivotState.measure=this.value; runPivot();">
                        <option value="tongtien">Tổng Doanh Thu (VND)</option>
                        <option value="soluong">Tổng Sản Lượng (Cái)</option>
                    </select>
                </div>
            </div>
            <!-- Hàng lọc Slice mới -->
            <div class="filter-grid" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <div class="filter-group">
                    <label><i class="fas fa-calendar-alt" style="color: #64748b;"></i> Lọc Thời Gian</label>
                    <div class="custom-dropdown" id="dropdown-thoigian">
                        <div class="dropdown-header" onclick="toggleDropdown('thoigian')">
                            <span class="dropdown-title">-- Chọn nhiều --</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="dropdown-list" id="list-thoigian"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-filter" style="color: #64748b;"></i> Lọc Vùng Miền</label>
                    <div class="custom-dropdown" id="dropdown-vpdd">
                        <div class="dropdown-header" onclick="toggleDropdown('vpdd')">
                            <span class="dropdown-title">-- Chọn nhiều --</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="dropdown-list" id="list-vpdd"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-users" style="color: #64748b;"></i> Lọc Khách Hàng</label>
                    <div class="custom-dropdown" id="dropdown-khachhang">
                        <div class="dropdown-header" onclick="toggleDropdown('khachhang')">
                            <span class="dropdown-title">-- Chọn nhiều --</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="dropdown-list" id="list-khachhang"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-box-open" style="color: #64748b;"></i> Lọc Mặt Hàng</label>
                    <div class="custom-dropdown" id="dropdown-mathang">
                        <div class="dropdown-header" onclick="toggleDropdown('mathang')">
                            <span class="dropdown-title">-- Chọn nhiều --</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="dropdown-list" id="list-mathang"></div>
                    </div>
                </div>
                <div class="filter-group" style="display: flex; align-items: flex-end;">
                    <button class="btn-reset" onclick="resetFilters()" style="width: 100%; height: 38px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; cursor: pointer;">
                        <i class="fas fa-undo"></i> Xóa hết lọc
                    </button>
                </div>
            </div>
        </section>

        <!-- Chart Section -->
        <section class="card" style="min-height: 500px;">
            <div class="chart-header">
                <h2 class="chart-title" id="chart-title">Phân tích dữ liệu</h2>
                <div id="active-slices"></div>
            </div>
            <div id="chart-loader" class="loader-overlay">
                <span class="loader"></span>
            </div>
            <div class="chart-area-container">
                <div id="main-chart" style="width: 100%; height: 450px;"></div>
                <div id="pie-chart" class="pie-chart-box" style="width: 100%; height: 450px;"></div>
            </div>
        </section>

        <!-- Table Section -->
        <section class="card table-card">
            <div class="table-header">
                <h3><i class="fas fa-table" style="color: #64748b; margin-right: 8px;"></i> Bảng số liệu chi tiết</h3>
                <button onclick="resetAllSlices()" class="reset-btn"><i class="fas fa-sync-alt"></i> Reset bộ lọc</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th id="th-x">Trục X</th>
                            <th id="th-y">Legend</th>
                            <th id="th-z">Trục Z</th>
                            <th style="text-align: right;">Giá Trị</th>
                        </tr>
                    </thead>
                    <tbody id="dt-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const DIM_NAMES = { thoigian: 'Thời Gian', vpdd: 'Vùng Miền', khachhang: 'Khách Hàng', mathang: 'Mặt Hàng' };
        let pivotState = {
            xAxis: 'thoigian', legend: null, zAxis: null, measure: 'tongtien',
            levels: { thoigian: 0, vpdd: 0, khachhang: 0, mathang: 0 },
            filters: { thoigian: {}, vpdd: {}, khachhang: {}, mathang: {} }
        };

        async function runPivot() {
            const xAxis = pivotState.xAxis || 'thoigian';
            document.getElementById('chart-title').innerHTML = `<i class="fas fa-chart-bar" style="color: #2563eb; margin-right: 8px;"></i> Phân tích ${DIM_NAMES[xAxis]}` + (pivotState.legend ? ` theo ${DIM_NAMES[pivotState.legend]}` : '');
            renderActiveSlices();

            const payload = {
                xAxis: xAxis, xLevelIdx: pivotState.levels[xAxis] || 0,
                legend: pivotState.legend, legendLevelIdx: pivotState.legend ? (pivotState.levels[pivotState.legend] || 0) : 0,
                zAxis: pivotState.zAxis, zLevelIdx: pivotState.zAxis ? (pivotState.levels[pivotState.zAxis] || 0) : 0,
                measure: pivotState.measure, filters: pivotState.filters
            };

            const loader = document.getElementById('chart-loader');
            loader.style.display = 'flex';

            try {
                const res = await fetch('/api/pivot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.error);
                
                // --- IN CÂU LỆNH MDX RA CONSOLE ---
                console.group("%c📊 OLAP QUERY EXECUTED", "color: #16a34a; font-size: 14px; font-weight: bold; background: #dcfce7; padding: 4px; border-radius: 4px;");
                console.log("%cTrạng thái State:", "color: #2563eb; font-weight: bold;", payload);
                console.log("%cCâu lệnh MDX:", "color: #9333ea; font-weight: bold;");
                console.log(json.mdx);
                console.groupEnd();
                // ----------------------------------

                const data = json.data || { x_labels: [], series: [], summary: { tongtien: 0, soluong: 0 } };

                // Cập nhật Số tổng ở Header (KPI)
                if (data.summary) {
                    const rev = new Intl.NumberFormat('vi-VN').format(Math.round(data.summary.tongtien));
                    const qty = new Intl.NumberFormat('vi-VN').format(Math.round(data.summary.soluong));
                    document.getElementById('kpi-revenue').innerText = rev + ' VNĐ';
                    document.getElementById('kpi-quantity').innerText = qty + ' Cái';
                }

                drawChart(data);
                fillTable(data);
                populateSliceDropdowns(data);
            } catch (e) {
                alert("OLAP Error: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function drawChart(data) {
            const chartDiv = document.getElementById('main-chart');
            const pieDiv = document.getElementById('pie-chart');

            if (!data || !data.series || data.series.length === 0) {
                chartDiv.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b;">Không có dữ liệu.</div>';
                pieDiv.innerHTML = '';
                return;
            }

            // 1. VẼ BIỂU ĐỒ CỘT (BAR CHART)
            const traces = data.series.map(s => ({
                x: data.x_labels || [], y: s.data || [], name: s.name || 'Tổng', type: 'bar',
                marker: { color: null },
                hovertemplate: `<b>%{x}</b><br>${s.name}: %{y:,.0f}<extra></extra>`
            }));
            const layout = {
                barmode: pivotState.xAxis === 'thoigian' ? 'stack' : 'group',
                xaxis: { type: 'category', tickangle: -45, tickfont: { size: 10, family: 'Inter' } },
                yaxis: { gridcolor: '#e2e8f0', tickfont: { size: 10, family: 'Inter' } },
                margin: { l: 50, r: 20, t: 20, b: 80 },
                plot_bgcolor: '#fff',
                paper_bgcolor: '#fff',
                showlegend: true,
                legend: { orientation: 'h', y: -0.3, font: { size: 10 } }
            };
            Plotly.newPlot(chartDiv, traces, layout, { responsive: true, displayModeBar: false });

            // 2. VẼ BIỂU ĐỒ TRÒN (PIE CHART)
            let pieLabels = [];
            let pieValues = [];

            if (pivotState.legend) {
                // Nếu có Legend: Chia theo từng Series (Vùng miền, Mặt hàng...)
                pieLabels = data.series.map(s => s.name);
                pieValues = data.series.map(s => s.data.reduce((a, b) => a + b, 0));
            } else {
                // Nếu KHÔNG có Legend: Chia theo các nhãn trên Trục X (Các Năm, Các Quý...)
                pieLabels = data.x_labels;
                // Tính tổng của tất cả series tại mỗi điểm X (thường chỉ có 1 series là "Tổng")
                pieValues = data.x_labels.map((_, idx) => {
                    return data.series.reduce((sum, s) => sum + (s.data[idx] || 0), 0);
                });
            }

            const pieTrace = {
                labels: pieLabels,
                values: pieValues,
                type: 'pie',
                hole: 0.4,
                direction: 'clockwise',
                textinfo: 'percent',
                insidetextorientation: 'radial',
                marker: { line: { color: '#fff', width: 2 } },
                hovertemplate: `<b>%{label}</b><br>Giá trị: %{value:,.0f}<br>Tỷ lệ: %{percent}<extra></extra>`
            };

            const pieLayout = {
                margin: { l: 20, r: 20, t: 40, b: 40 },
                showlegend: true,
                legend: { orientation: 'h', y: -0.15, font: { size: 9 } },
                title: {
                    text: pivotState.legend ? `Tỷ trọng theo ${DIM_NAMES[pivotState.legend]}` : `Tỷ trọng theo ${DIM_NAMES[pivotState.xAxis]}`,
                    font: { size: 12, weight: 700 }
                },
                paper_bgcolor: 'rgba(0,0,0,0)'
            };

            Plotly.newPlot(pieDiv, [pieTrace], pieLayout, { responsive: true, displayModeBar: false });

        // 3. TƯƠNG TÁC ĐỒNG BỘ
            function applyAction(val, isLegend = false) {
                if (val) {
                    let cleanedVal = String(val).split(' - ').pop();
                    cleanedVal = cleanedVal.replace(/Quý |Quy |Tháng |Thang |Năm |Nam /g, '').trim();
                    const dim = isLegend && pivotState.legend ? pivotState.legend : pivotState.xAxis;
                    const lvls = { thoigian: ['Nam', 'Quy', 'Thang'], vpdd: ['Bang', 'TenThanhPho'], khachhang: ['LoaiKhachHang', 'TenKhachHang'], mathang: ['MoTa', 'KichCo'] };
                    const lvlIdx = pivotState.levels[dim] || 0;
                    if (lvlIdx < lvls[dim].length - 1) {
                        if (!pivotState.filters[dim]) pivotState.filters[dim] = {};
                        pivotState.filters[dim][lvls[dim][lvlIdx]] = cleanedVal;
                        pivotState.levels[dim] = lvlIdx + 1;
                        runPivot();
                    }
                }
            }

            chartDiv.on('plotly_click', d => {
                if (d.points && d.points[0]) applyAction(d.points[0].x, false);
            });

            pieDiv.on('plotly_click', d => {
                if (d.points && d.points[0]) {
                    if (pivotState.legend) {
                        applyAction(d.points[0].label, true);
                    } else {
                        applyAction(d.points[0].label, false);
                    }
                }
            });
        }

        function fillTable(data) {
            const body = document.getElementById('dt-body');
            const xAxis = pivotState.xAxis || 'thoigian';
            document.getElementById('th-x').textContent = DIM_NAMES[xAxis];
            document.getElementById('th-y').textContent = pivotState.legend ? DIM_NAMES[pivotState.legend] : '-';
            document.getElementById('th-z').textContent = pivotState.zAxis ? DIM_NAMES[pivotState.zAxis] : '-';
            let tableHTML = '';
            if (data && data.x_labels && data.series) {
                data.x_labels.forEach((xVal, xIdx) => {
                    data.series.forEach(s => {
                        const val = (s.data && s.data[xIdx]) ? s.data[xIdx] : 0;
                        if (val === 0) return;
                        tableHTML += `<tr><td style="font-weight:700;">${xVal}</td><td>${s.leg_val}</td><td>${s.z_val}</td><td class="val-col">${new Intl.NumberFormat().format(val)}</td></tr>`;
                    });
                });
            }
            body.innerHTML = tableHTML || '<tr><td colspan="4" style="text-align:center; padding: 2rem;">Không có dữ liệu.</td></tr>';
        }

        function rollUp(dim) {
            const lvls = { thoigian: ['Nam', 'Quy', 'Thang'], vpdd: ['Bang', 'TenThanhPho'], khachhang: ['LoaiKhachHang', 'TenKhachHang'], mathang: ['MoTa', 'KichCo'] };
            let currentLvl = pivotState.levels[dim] || 0;
            if (currentLvl > 0) {
                let prevLvlName = lvls[dim][currentLvl - 1];
                delete pivotState.filters[dim][prevLvlName];
                pivotState.levels[dim]--;
                
                // Đồng bộ dropdown Slice nếu cuộn lên level 0
                if (pivotState.levels[dim] === 0 && document.getElementById(`slice-${dim}`)) {
                    document.getElementById(`slice-${dim}`).value = "";
                }
                
                runPivot();
            }
        }

        function clearDimFilters(dim) {
            pivotState.filters[dim] = {};
            pivotState.levels[dim] = 0;
            const list = document.getElementById(`list-${dim}`);
            if (list) {
                list.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            }
            const header = document.getElementById(`dropdown-${dim}`);
            if (header) {
                header.querySelector('.dropdown-title').textContent = '-- Chọn nhiều --';
            }
            runPivot();
        }

        function resetFilters() {
            Object.keys(pivotState.levels).forEach(k => { pivotState.levels[k] = 0; pivotState.filters[k] = {}; });
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.dropdown-title').forEach(el => el.textContent = '-- Chọn nhiều --');
            runPivot();
        }
        
        function resetAllSlices() {
            resetFilters();
        }

        function toggleDropdown(dimId) {
            // Đóng các dropdown khác
            document.querySelectorAll('.dropdown-list').forEach(list => {
                if (list.id !== `list-${dimId}`) list.classList.remove('active');
            });
            const list = document.getElementById(`list-${dimId}`);
            if (list) list.classList.toggle('active');
        }

        window.updateSliceCheckbox = function(dimId) {
            const lvls = { thoigian: ['Nam', 'Quy', 'Thang'], vpdd: ['Bang', 'TenThanhPho'], khachhang: ['LoaiKhachHang', 'TenKhachHang'], mathang: ['MoTa', 'KichCo'] };
            const lvl = lvls[dimId][0]; // Hiện tại chỉ hỗ trợ dice ở level 0
            
            const list = document.getElementById(`list-${dimId}`);
            const checkboxes = list.querySelectorAll('input[type="checkbox"]:checked');
            const selectedOptions = Array.from(checkboxes).map(cb => cb.value);
            
            // Cập nhật text hiển thị
            const header = document.getElementById(`dropdown-${dimId}`).querySelector('.dropdown-title');
            if (selectedOptions.length > 0) {
                header.textContent = `Đã chọn (${selectedOptions.length})`;
            } else {
                header.textContent = '-- Chọn nhiều --';
            }
            
            if (selectedOptions.length > 0) {
                if (!pivotState.filters[dimId]) pivotState.filters[dimId] = {};
                pivotState.filters[dimId][lvl] = selectedOptions;
                // Bỏ tự động nhảy level khi tick chọn (Dice) để có thể xem được nhiều năm cùng lúc
            } else {
                delete pivotState.filters[dimId][lvl];
                // Bỏ tự động lùi level khi bỏ tick
            }
            runPivot();
        }

        function populateSliceDropdowns(data) {
            const dims = ['thoigian', 'vpdd', 'khachhang', 'mathang'];
            dims.forEach(d => {
                const list = document.getElementById(`list-${d}`);
                if (!list) return;
                
                // Chỉ populate khi ở level 0 của trục X, và list chưa có checkboxes
                if (pivotState.xAxis === d && pivotState.levels[d] === 0 && list.children.length === 0) {
                    list.innerHTML = '';
                    data.x_labels.forEach(lbl => {
                        const val = lbl.split(' - ').pop();
                        
                        const label = document.createElement('label');
                        label.className = 'dropdown-item';
                        
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.value = val;
                        cb.onchange = () => updateSliceCheckbox(d);
                        
                        const text = document.createTextNode(' ' + val);
                        label.appendChild(cb);
                        label.appendChild(text);
                        list.appendChild(label);
                    });
                }
            });
        }

        function renderActiveSlices() {
            const container = document.getElementById('active-slices');
            if (!container) return;
            container.innerHTML = '';
            
            const DIM_LABELS = { thoigian: 'Thời Gian', vpdd: 'Vùng Miền', khachhang: 'Khách Hàng', mathang: 'Mặt Hàng' };
            const lvls = { thoigian: ['Nam', 'Quy', 'Thang'], vpdd: ['Bang', 'TenThanhPho'], khachhang: ['LoaiKhachHang', 'TenKhachHang'], mathang: ['MoTa', 'KichCo'] };
            
            let html = '';
            let hasFilters = false;
            
            for (const d in pivotState.filters) {
                let path = [];
                for (let i = 0; i < lvls[d].length; i++) {
                    const l = lvls[d][i];
                    const v = pivotState.filters[d][l];
                    if (v) {
                        hasFilters = true;
                        let displayValue = Array.isArray(v) ? v.join(', ') : v;
                        path.push(`<span class="breadcrumb-item" style="font-weight:600; color:#2563eb;">${displayValue}</span>`);
                    }
                }
                
                if (path.length > 0) {
                    html += `<div class="filter-chip hierarchy-chip" style="display:inline-flex; align-items:center; background:#e0f2fe; padding: 4px 10px; border-radius: 16px; margin-right: 8px; margin-bottom: 8px; font-size: 0.85rem;">
                        <span class="dim-label" style="color:#0f172a; margin-right: 4px;">${DIM_LABELS[d]}:</span> 
                        ${path.join('<i class="fas fa-chevron-right separator" style="margin: 0 4px; font-size: 0.7rem; color:#94a3b8;"></i>')}
                        <i class="fas fa-level-up-alt roll-up-btn" title="Roll Up (Lên 1 cấp)" onclick="rollUp('${d}')" style="margin-left: 8px; cursor: pointer; color: #475569; padding: 2px;"></i>
                        <i class="fas fa-times-circle close-btn" title="Xóa toàn bộ lọc" onclick="clearDimFilters('${d}')" style="margin-left: 5px; cursor: pointer; color: #ef4444; padding: 2px;"></i>
                    </div>`;
                }
            }
            
            if (html) {
                container.innerHTML = html;
            } else {
                container.innerHTML = '<span style="font-size: 0.85rem; color: #64748b; font-style: italic;"><i class="fas fa-info-circle"></i> Click vào cột hoặc biểu đồ tròn để Drill-down (Phân cấp chi tiết).</span>';
            }
        }

        // Đóng dropdown khi click ra ngoài
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-list.active').forEach(list => list.classList.remove('active'));
            }
        });

        document.addEventListener('DOMContentLoaded', runPivot);
    </script>
</body>

</html>
